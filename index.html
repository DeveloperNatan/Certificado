<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#f8f5f5] flex items-center justify-center px-4">
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 border-t-8 border-[#7b1c2e]"
    >
      <div class="flex space-between">
        <h1 class="text-2xl font-bold text-[#7b1c2e] my-2">
          Emitir Certificado
        </h1>
        <img
          src="/logo.png"
          alt="logo catolica"
          class="w-12 h-12 mx-2 rounded-lg"
        />
      </div>

      <p class="text-sm text-gray-500 mb-6 mt-2">
        Digite seu nome e e-mail para receber seu certificado de conclusão.
      </p>

      <form id="form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Nome</label
          >
          <input
            id="nome"
            type="text"
            class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#7b1c2e]"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >E-mail</label
          >
          <input
            id="email"
            type="email"
            class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#7b1c2e]"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-[#7b1c2e] text-white py-3 rounded-lg hover:bg-[#5e1522] transition"
        >
          Enviar certificado
        </button>
      </form>

      <p id="msg" class="mt-4 text-sm"></p>
    </div>

    <script>
      const form = document.getElementById("form");
      const msg = document.getElementById("msg");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "Enviando...";
        msg.className = "mt-4 text-sm text-gray-600";

        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;

        try {
          const res = await fetch("/enviar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome, email }),
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Erro");

          msg.textContent = "Certificado enviado com sucesso!";
          msg.className = "mt-4 text-sm text-green-600";
          form.reset();
        } catch (err) {
          msg.textContent = "Erro ao enviar.";
          msg.className = "mt-4 text-sm text-red-600";
        }
      });
    </script>
  </body>
</html>
